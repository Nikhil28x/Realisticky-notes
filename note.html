<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Note</title>
  <link rel="stylesheet" href="note.css" />
</head>
<body>
  <div class="note" id="note">
    <div class="peel-corner" id="peel-corner"></div>
    <div class="crumple-overlay" id="crumple-overlay">
      <svg viewBox="0 0 242 242" preserveAspectRatio="none">
        <line class="wrinkle w1" x1="20" y1="30" x2="200" y2="50" />
        <line class="wrinkle w2" x1="40" y1="80" x2="220" y2="70" />
        <line class="wrinkle w3" x1="10" y1="130" x2="180" y2="145" />
        <line class="wrinkle w4" x1="50" y1="170" x2="230" y2="160" />
        <line class="wrinkle w5" x1="30" y1="200" x2="210" y2="215" />
        <line class="wrinkle w6" x1="60" y1="60" x2="70" y2="220" />
        <line class="wrinkle w7" x1="150" y1="20" x2="165" y2="200" />
      </svg>
    </div>
    <button class="close-btn" id="close-btn" title="Close">×</button>
    <div class="text-area" id="text-area" contenteditable="true" spellcheck="false"></div>
  </div>
  <script src="note.js"></script>
</body>
</html>
